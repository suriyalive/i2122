        <script>
    // ชื่อไฟล์ที่ต้องการดึง (ต้องอยู่ในโฟลเดอร์เดียวกันบน GitHub)
    const fileName = 'Text Portfolio Alexa.txt';

    fetch(fileName)
        .then(response => {
            if (!response.ok) {
                throw new Error('ไม่สามารถดึงข้อมูลไฟล์ได้');
            }
            return response.text(); // อ่านข้อมูลเป็นแบบข้อความ (Text)
        })
        .then(data => {
            // นำข้อมูลไปใส่ใน div ที่เราเตรียมไว้
            document.getElementById('content-display').textContent = data;
        })
        .catch(error => {
            console.error('เกิดข้อผิดพลาด:', error);
            document.getElementById('content-display').textContent = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
        });
</script>
