<script>
    const fileName = 'TextPortfolioAlexa.txt';

    fetch(fileName)
        .then(response => {
            if (!response.ok) throw new Error('หาไฟล์ไม่เจอ');
            return response.text();
        })
        .then(text => {
            // 1. แยกข้อมูลด้วยเครื่องหมาย *
            const sections = text.split('*');

            sections.forEach(section => {
                const lines = section.trim().split('\n');
                const header = lines[0].trim(); // เช่น HOME, ABOUT, SERVICES
                const content = lines.slice(1).join('\n').trim(); // เนื้อหาที่เหลือ

                // 2. ตรวจสอบว่าหัวข้อตรงกับจุดที่เราเตรียมไว้ไหม
                if (header === 'HOME') {
                    document.getElementById('home-data').innerText = content;
                } else if (header === 'ABOUT') {
                    document.getElementById('about-data').innerText = content;
                } else if (header === 'SERVICES') {
                    document.getElementById('services-data').innerText = content;
                } else if (header === 'PORTFOLIO') {
                    // ถ้าคุณมี id="portfolio-data" ก็เพิ่มตรงนี้ได้ครับ
                }
            });
        })
        .catch(error => {
            console.error('Error:', error);
        });
</script>
        
        
    </body>
